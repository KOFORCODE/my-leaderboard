<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comboo 500 — Tier List</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
:root{
  --bg0:#0c0e14;--bg1:#111420;--bg2:#181c28;--bg3:#1e2335;
  --text1:#eceef4;--text2:#8b91a8;--text3:#4a5068;
  --accent:#e8b84b;--accent2:#c49a2a;
  --border:#ffffff0d;--border2:#ffffff1a;
}
body{background:var(--bg0);color:var(--text1);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* NAV */
nav{background:var(--bg1);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-size:1.1rem;font-weight:800;letter-spacing:-0.03em}
.logo-text span{color:var(--accent)}
.nav-center{display:flex;align-items:center;gap:8px}
.nav-link{color:var(--text3);font-size:0.82rem;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;text-decoration:none}
.nav-link:hover{color:var(--text1);background:#ffffff08}
.nav-right{display:flex;align-items:center;gap:10px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px}
.search-wrap input{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:7px 32px 7px 32px;color:var(--text1);font-size:0.82rem;width:210px;outline:none;transition:border .2s}
.search-wrap input:focus{border-color:#e8b84b55}
.search-wrap input::placeholder{color:var(--text3)}
.kbd{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);font-size:0.65rem;padding:2px 5px;border-radius:4px;position:absolute;right:8px;top:50%;transform:translateY(-50%)}

/* TABS */
.tabs-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;min-width:0;-webkit-overflow-scrolling:touch;touch-action:pan-x;overscroll-behavior-x:contain}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:7px;padding:0 18px;height:46px;border:none;background:none;color:var(--text3);font-size:0.8rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text1);border-bottom-color:var(--accent)}
.tab-icon{font-size:1rem;display:flex;align-items:center}
.tab-icon img{width:20px;height:20px;object-fit:contain;border-radius:3px}

/* SERVER BADGE */
.server-info{display:flex;align-items:center;gap:8px;margin-left:auto;padding:0 1rem}
.server-ip-badge{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:0.72rem;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:6px}
.server-ip-badge span{color:var(--text3)}

/* MAIN */
main{max-width:1280px;margin:0 auto;padding:1rem 1.5rem 4rem}

/* TABLE */
.table-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.t-head{display:grid;grid-template-columns:64px minmax(0,1fr) 1fr;padding:0 1rem;height:36px;align-items:center;border-bottom:1px solid var(--border);color:var(--text3);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;gap:8px}
.t-head-right{text-align:left;padding-left:0}

.t-row{display:grid;grid-template-columns:64px minmax(0,1fr) 1fr;padding:0 1rem;align-items:center;border-bottom:1px solid var(--border);transition:background .15s;min-height:72px;gap:8px}
.t-row:last-child{border-bottom:none}
.t-row:hover{background:#ffffff04}
.t-row.r1{background:#e8b84b06}
.t-row.r2{background:#a0a8b806}
.t-row.r3{background:#c87a3a06}
.t-row{transition:background .15s,transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease;}
.t-row:hover{background:#ffffff06;transform:translateY(-3px) scale(1.008);box-shadow:0 8px 28px #0000005a,0 2px 8px #00000040;border-radius:10px;z-index:3;position:relative;}

/* RANK */
.rank-wrap{display:flex;align-items:center;gap:0;justify-content:flex-start}
.rank-box{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;background:var(--bg3)}
.t-row.r1 .rank-box{background:#e8b84b22;color:#f5c842;border:1px solid #e8b84b30}
.t-row.r2 .rank-box{background:#a0a8b822;color:#c8cfe0;border:1px solid #a0a8b830}
.t-row.r3 .rank-box{background:#c87a3a22;color:#e09060;border:1px solid #c87a3a30}
.rank-box.normal{color:var(--text3);font-size:0.95rem;border:1px solid var(--border2)}

/* PLAYER LEFT */
.player-cell{display:flex;align-items:center;gap:12px;padding:10px 0;min-width:0}
.avatar{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:700;color:var(--text3);overflow:hidden;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.avatar-rank-badge{position:absolute;bottom:-3px;right:-3px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;border:2px solid var(--bg1)}
.player-info{display:flex;flex-direction:column;gap:4px;min-width:0;overflow:hidden}
.player-name{font-size:0.97rem;font-weight:700;color:var(--text1);display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;line-clamp:2;overflow:hidden;word-break:break-word;line-height:1.25}
.player-sub{display:flex;align-items:center;gap:6px}
.player-badge{font-size:0.68rem;padding:2px 7px;border-radius:4px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.badge-diamond{background:#00d4ff18;color:#55e0ff;border:1px solid #00d4ff30}
.badge-master{background:#aa44ff18;color:#cc77ff;border:1px solid #aa44ff30}
.badge-ace{background:#e8b84b18;color:#e8b84b;border:1px solid #e8b84b30}
.badge-pts{color:var(--text3);font-size:0.7rem;font-weight:600}

/* TIERS RIGHT */
.tiers-col{display:flex;align-items:center;justify-content:flex-start;gap:4px;flex-wrap:nowrap;overflow:hidden;}
.mode-tier-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.mode-icon{width:30px;height:30px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:0.85rem;overflow:hidden;border:1px solid var(--border2)}
.mode-icon img{width:100%;height:100%;object-fit:cover;border-radius:5px}
.tier-mini{height:18px;min-width:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:800;border:1px solid;padding:0 4px}

/* TIER COLOURS */
.t-S {background:#e8b84b18;color:#e8b84b;border-color:#e8b84b50}
.t-Ap{background:#ff4d4d18;color:#ff6b6b;border-color:#ff4d4d50}
.t-A {background:#ff7a2718;color:#ff9355;border-color:#ff7a2750}
.t-Am{background:#ffaa0018;color:#ffbe44;border-color:#ffaa0050}
.t-Bp{background:#a8ff2718;color:#c3ff5a;border-color:#a8ff2750}
.t-B {background:#44ff8818;color:#5fffaa;border-color:#44ff8850}
.t-Bm{background:#00d4aa18;color:#00e8bb;border-color:#00d4aa50}
.t-Cp{background:#27b8ff18;color:#55cbff;border-color:#27b8ff50}
.t-C {background:#2787ff18;color:#55a3ff;border-color:#2787ff50}
.t-Cm{background:#6c63ff18;color:#9d97ff;border-color:#6c63ff50}
.t-Dp{background:#aa44ff18;color:#cc77ff;border-color:#aa44ff50}
.t-D {background:#ff44bb18;color:#ff77cc;border-color:#ff44bb50}
.t-Dm{background:#ff446618;color:#ff7788;border-color:#ff446650}
.t-F {background:#44444418;color:#777;border-color:#44444450}

/* REGION */
.reg{display:inline-block;padding:3px 7px;border-radius:5px;font-size:0.65rem;font-weight:800;letter-spacing:0.06em}
.reg-TH{background:#00d4aa18;color:#00d4aa;border:1px solid #00d4aa30}
.reg-AS{background:#6c63ff18;color:#9d97ff;border:1px solid #6c63ff30}
.reg-EU{background:#27b8ff18;color:#55cbff;border:1px solid #27b8ff30}
.reg-NA{background:#ffaa0018;color:#ffbe44;border:1px solid #ffaa0030}

/* EMPTY / LOADING */
.empty{text-align:center;padding:5rem 2rem;color:var(--text3)}
.empty .empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty p{font-size:0.9rem;margin-top:6px}
.loading{text-align:center;padding:4rem;color:var(--text3);font-size:0.88rem}
.loading-dots::after{content:'...';animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%,100%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* HERO STATS */
.hero{display:none;padding:1rem 1.5rem;max-width:1280px;margin:0 auto;align-items:center;gap:10px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:0.75rem 1.2rem;display:flex;align-items:center;gap:10px}
.stat-icon{font-size:1.1rem}
.stat-info{}
.stat-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-weight:700}
.stat-val{font-size:1.05rem;font-weight:800;color:var(--text1);line-height:1.1}
.stat-val small{font-size:0.7rem;color:var(--text3);font-weight:500;margin-left:2px}

.mobile-tiers{display:none}
@media(max-width:768px){
  .t-head,.t-row{grid-template-columns:44px minmax(0,1fr) auto;gap:6px}
  .t-row{align-items:center}
  .rank-wrap{display:flex;align-items:center;justify-content:center}
  .rank-box{width:34px;height:34px;font-size:0.9rem}
  .player-cell{padding:8px 0;gap:8px}
  .avatar{width:40px;height:40px;font-size:1rem;flex-shrink:0}
  .player-name{font-size:0.85rem}
  .tiers-col{display:flex;flex-direction:row;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap;overflow:visible}
  .mode-tier-item{flex-direction:column;align-items:center;gap:3px}
  .mode-icon{width:28px;height:28px;border-radius:5px;font-size:0.8rem}
  .tier-mini{height:19px;min-width:30px;font-size:0.62rem;padding:0 4px}
  .t-head-tiers{display:block;text-align:right}
  .tabs-bar{padding:0.6rem 0.9rem;gap:10px}
  .tab-btn{flex-direction:column;justify-content:center;height:auto;min-width:74px;padding:9px 12px 10px;font-size:0.68rem;gap:6px;border-radius:12px;border-bottom:3px solid transparent}
  .tab-btn.active{border-color:transparent;border-bottom-color:var(--accent);background:var(--bg2)}
  .tab-icon img{width:28px;height:28px}
  .tab-icon{font-size:1.35rem}
  nav{padding:0 1rem}
  main,.hero{padding-left:1rem;padding-right:1rem}
  .hero{flex-wrap:wrap}
  .nav-center{display:none}
  .search-wrap input{width:160px}
  .server-info{display:none!important}
}

/* RIPPLE */
.ripple-host{position:relative;overflow:hidden}
@keyframes ripple-expand{to{transform:scale(4);opacity:0}}
.ripple-circle{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,#e8b84b44 0%,#e8b84b00 70%);
  transform:scale(0);animation:ripple-expand .55s ease-out forwards;
  pointer-events:none;
}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:#00000088;backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;transition:opacity .2s}
.modal-backdrop.show{opacity:1}
.modal-card{background:#13172200;width:100%;max-width:360px;border-radius:20px;overflow:hidden;transform:translateY(20px) scale(.96);transition:transform .25s cubic-bezier(.34,1.56,.64,1);position:relative}
.modal-backdrop.show .modal-card{transform:translateY(0) scale(1)}
.modal-inner{background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:2rem 1.5rem 1.5rem;text-align:center;position:relative}
.modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--bg2);color:var(--text1)}
.modal-avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.3rem;font-weight:800;color:var(--text3);margin:0 auto 12px;overflow:hidden;border:3px solid var(--border2)}
.modal-avatar img{width:100%;height:100%;object-fit:cover}
.modal-name{font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:6px}
.modal-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:0.82rem;font-weight:700;margin-bottom:8px}
.modal-region{color:var(--text3);font-size:0.82rem;margin-bottom:16px}
.modal-section{text-align:left;margin-top:16px}
.modal-section-title{font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;font-weight:700;margin-bottom:8px}
.modal-position-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.modal-pos-num{font-size:1.4rem;font-weight:800;color:var(--text1);min-width:32px}
.modal-pos-detail{display:flex;align-items:center;gap:8px;font-size:0.88rem;font-weight:700}
.modal-tiers-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px;display:flex;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-text"><span>Comboo</span> 500</div>
  </div>
  <div class="nav-center">
    <a class="nav-link" href="#">🏆 Rankings</a>
    <a class="nav-link" href="#">💬 Discord</a>
    <a class="nav-link" href="#">📄 API Docs</a>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหาผู้เล่น..." oninput="render()">
      <span class="kbd">/</span>
    </div>
  </div>
</nav>

<div style="display:flex;align-items:stretch;background:var(--bg1);border-bottom:1px solid var(--border)">
  <div class="tabs-bar" id="tabsBar" style="flex:1;border-bottom:none"></div>
  <div class="server-info" id="serverInfo" style="display:none">
    <div class="server-ip-badge">ℹ️ Information</div>
    <div class="server-ip-badge"><span>SERVER IP</span> comboo.net</div>
  </div>
</div>

<div class="hero" id="heroStats"></div>

<main>
  <div class="table-wrap">
    <div class="t-head">
      <div>#</div>
      <div>PLAYER</div>
      <div class="t-head-right t-head-tiers" id="tierHeader">TIERS</div>
    </div>
    <div id="tableBody"><div class="loading"><span class="loading-dots">กำลังโหลด</span></div></div>
  </div>
</main>

<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal-card" id="modalCard">
    <div class="modal-inner" id="modalInner"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qfdtnfhcdxucckxakrgu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmZHRuZmhjZHh1Y2NreGFrcmd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjY1ODgsImV4cCI6MjA5Njk0MjU4OH0.7GpvmHdssndqwu1LAe4YhBAQoPrW7olw1u7CBAIC46g';

const TIER_ORDER = ['S','A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','F'];
const TIER_CLASS = {'S':'t-S','A+':'t-Ap','A':'t-A','A-':'t-Am','B+':'t-Bp','B':'t-B','B-':'t-Bm','C+':'t-Cp','C':'t-C','C-':'t-Cm','D+':'t-Dp','D':'t-D','D-':'t-Dm','F':'t-F'};
const TIER_SCORE = {'S':15,'A+':12,'A':11,'A-':10,'B+':9,'B':8,'B-':7,'C+':6,'C':5,'C-':4,'D+':3,'D':2,'D-':1,'F':0};

let modes=[], players=[], tiers=[], activeMode='overall';

function esc(v){
  return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function jsArg(v){
  return esc(JSON.stringify(v));
}

async function api(path){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON}});
  if(!r.ok) throw new Error(`API error ${r.status}`);
  return r.json();
}

function apiWithTimeout(path, ms=8000){
  return Promise.race([
    api(path),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))
  ]);
}

async function load(){
  // แสดง tab Overall ทันทีก่อน API ตอบ ให้กดได้เลย
  document.getElementById('tabsBar').innerHTML=`<button class="tab-btn active" onclick="setMode('overall')"><span class="tab-icon">🏆</span>Overall</button>`;
  document.getElementById('serverInfo').style.display='flex';

  try{
    [modes,players,tiers]=await Promise.all([
      apiWithTimeout('modes?order=sort_order'),
      apiWithTimeout('players?order=name'),
      apiWithTimeout('player_tiers?select=*')
    ]);
    renderTabs();
    render();
  }catch(err){
    console.error(err);
    document.getElementById('heroStats').innerHTML='';
    const msg=err.message==='timeout'?'การเชื่อมต่อช้าเกินไป ลองรีเฟรชใหม่':'โหลดข้อมูลไม่สำเร็จ';
    document.getElementById('tableBody').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>${msg}</p><p style="margin-top:12px"><button onclick="location.reload()" style="background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 20px;font-weight:700;cursor:pointer;font-size:0.85rem">ลองใหม่</button></p></div>`;
  }
}

function renderTabs(){
  const overallBtn=`<button class="tab-btn${activeMode==='overall'?' active':''}" onclick="setMode('overall')">
    <span class="tab-icon">🏆</span>Overall
  </button>`;
  const modeBtns=modes.map(m=>{
    const modeName=esc(m.name);
    const iconHtml=m.icon_url
      ?`<span class="tab-icon"><img src="${esc(m.icon_url)}" alt="${modeName}"></span>`
      :`<span class="tab-icon">${esc(m.icon||'🎮')}</span>`;
    return`<button class="tab-btn${m.id===activeMode?' active':''}" onclick="setMode(${jsArg(m.id)})">
      ${iconHtml}${modeName}
    </button>`;
  }).join('');
  document.getElementById('tabsBar').innerHTML=overallBtn+modeBtns;
  document.getElementById('serverInfo').style.display='flex';
}

function setMode(id){activeMode=id;renderTabs();render()}
function tierScore(t){const i=TIER_ORDER.indexOf(t);return i===-1?99:i}

function badgeClass(badge){
  if(!badge)return'badge-ace';
  const b=badge.toLowerCase();
  if(b.includes('master'))return'badge-master';
  if(b.includes('diamond'))return'badge-diamond';
  return'badge-ace';
}

function renderRow(p, rank, scoreOrTier, isOverall, allModes, tiersByPlayer){
  const rankClass=rank<=3?` r${rank}`:'';
  const rankBoxClass=rank>3?' normal':'';
  const playerName=esc(p.name);
  const reg=esc(p.region||'TH');
  const regClass=String(p.region||'TH').replace(/[^a-zA-Z0-9_-]/g,'');
  const badge=esc(p.badge);
  const av=p.avatar
    ?`<div class="avatar"><img src="${esc(p.avatar)}" alt="${playerName}" loading="lazy"></div>`
    :`<div class="avatar">${esc((p.name?.[0]||'?').toUpperCase())}</div>`;

  const bclass=badgeClass(p.badge);
  const scoreText=isOverall?`${scoreOrTier} pts`:scoreOrTier;
  const ptsHtml=isOverall?` <span class="badge-pts">(${scoreText})</span>`:` <span class="tier-mini ${TIER_CLASS[scoreOrTier]||'t-F'}">${scoreOrTier}</span>`;
  const badgeHtml=p.badge
    ?`<span class="player-badge ${bclass}">◈ ${badge}${ptsHtml}</span>`
    :`<span class="${isOverall?'badge-pts':`tier-mini ${TIER_CLASS[scoreOrTier]||'t-F'}`}">${scoreText}</span>`;

  // tiers column — เฉพาะ mode ที่มี tier เท่านั้น
  const modesForRight = allModes.length ? allModes : [];
  const tiersRight = modesForRight.map(m=>{
    const tier=(tiersByPlayer[p.id]||{})[m.id];
    if(!tier) return''; // ไม่มี tier ไม่แสดง
    const iconContent=m.icon_url?`<img src="${esc(m.icon_url)}" alt="${esc(m.name)}">`:esc(m.icon||'🎮');
    return`<div class="mode-tier-item">
      <div class="mode-icon">${iconContent}</div>
      <div class="tier-mini ${TIER_CLASS[tier]||'t-F'}">${tier}</div>
    </div>`;
  }).join('');

  return`<div class="t-row${rankClass}" onclick="openModal(${jsArg(p.id)},${rank},${isOverall?scoreOrTier:0})" style="cursor:pointer">
    <div class="rank-wrap"><div class="rank-box${rankBoxClass}">${rank}</div></div>
    <div class="player-cell">
      ${av}
      <div class="player-info">
        <div class="player-name">${playerName} <span class="reg reg-${regClass}">${reg}</span></div>
        <div class="player-sub">${badgeHtml}</div>
      </div>
    </div>
    <div class="tiers-col col-tiers">${tiersRight}</div>
  </div>`;
}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();

  // build per-player tier map: {player_id: {mode_id: tier_type}}
  const tiersByPlayer={};
  tiers.forEach(t=>{
    if(!tiersByPlayer[t.player_id]) tiersByPlayer[t.player_id]={};
    tiersByPlayer[t.player_id][t.mode_id]=t.tier_type;
  });

  if(activeMode==='overall'){
    const overallModes=modes.filter(m=>m.include_in_overall);
    const overallModeIds=new Set(overallModes.map(m=>m.id));
    const scoreMap={};
    tiers.filter(t=>overallModeIds.has(t.mode_id)).forEach(t=>{
      if(!scoreMap[t.player_id]) scoreMap[t.player_id]=0;
      scoreMap[t.player_id]+=(TIER_SCORE[t.tier_type]||0);
    });

    let list=players.filter(p=>scoreMap[p.id]!==undefined);
    if(q) list=list.filter(p=>String(p.name||'').toLowerCase().includes(q)||(p.uid&&String(p.uid).includes(q)));
    list=list.map((p,i)=>({...p,_idx:i}));
    list.sort((a,b)=>{
      const diff=scoreMap[b.id]-scoreMap[a.id];
      return diff!==0?diff:a._idx-b._idx;
    });

    document.getElementById('heroStats').innerHTML=`
      <div class="stat-card"><span class="stat-icon">👥</span><div class="stat-info"><div class="stat-label">ผู้เล่นทั้งหมด</div><div class="stat-val">${list.length}<small>คน</small></div></div></div>
      <div class="stat-card"><span class="stat-icon">🎮</span><div class="stat-info"><div class="stat-label">Mode ที่นับ</div><div class="stat-val">${overallModes.length}<small>mode</small></div></div></div>
      <div class="stat-card"><span class="stat-icon">⭐</span><div class="stat-info"><div class="stat-label">คะแนนสูงสุด</div><div class="stat-val">${list.length?scoreMap[list[0].id]:0}<small>pts</small></div></div></div>
    `;

    document.getElementById('tierHeader').textContent='TIERS';
    if(!list.length){
      document.getElementById('tableBody').innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><p>ยังไม่มีข้อมูล Overall</p></div>`;
      return;
    }
    document.getElementById('tableBody').innerHTML=list.map((p,i)=>
      renderRow(p, i+1, scoreMap[p.id], true, overallModes, tiersByPlayer)
    ).join('');
    return;
  }

  // single mode
  const modeTiers=tiers.filter(t=>t.mode_id===activeMode);
  const tierMap={};
  modeTiers.forEach(t=>tierMap[t.player_id]=t);

  let list=players.filter(p=>tierMap[p.id]);
  if(q) list=list.filter(p=>String(p.name||'').toLowerCase().includes(q)||(p.uid&&String(p.uid).includes(q)));
  list.sort((a,b)=>tierScore(tierMap[a.id]?.tier_type)-tierScore(tierMap[b.id]?.tier_type));

  const counts={};
  TIER_ORDER.forEach(t=>counts[t]=0);
  modeTiers.forEach(t=>{if(counts[t.tier_type]!==undefined)counts[t.tier_type]++});
  const topTier=TIER_ORDER.find(t=>counts[t]>0)||'-';

  document.getElementById('heroStats').innerHTML=`
    <div class="stat-card"><span class="stat-icon">👥</span><div class="stat-info"><div class="stat-label">ผู้เล่น</div><div class="stat-val">${list.length}<small>คน</small></div></div></div>
    <div class="stat-card"><span class="stat-icon">🥇</span><div class="stat-info"><div class="stat-label">Tier สูงสุด</div><div class="stat-val">${topTier}</div></div></div>
    <div class="stat-card"><span class="stat-icon">⭐</span><div class="stat-info"><div class="stat-label">S Tier</div><div class="stat-val">${counts['S']}<small>คน</small></div></div></div>
  `;

  // For single mode: show only the selected mode. Overall still shows all counted modes.
  const selectedModes=modes.filter(m=>m.id===activeMode);
  document.getElementById('tierHeader').textContent='TIER';

  if(!list.length){
    document.getElementById('tableBody').innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><p>ยังไม่มีผู้เล่นใน mode นี้</p></div>`;
    return;
  }
  document.getElementById('tableBody').innerHTML=list.map((p,i)=>
    renderRow(p, i+1, tierMap[p.id]?.tier_type||'F', false, selectedModes, tiersByPlayer)
  ).join('');
}

// keyboard shortcut
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

load();

function openModal(pid, rank, pts){
  const p=players.find(x=>x.id===pid);
  if(!p) return;
  const playerName=esc(p.name);
  const reg=esc(p.region||'TH');
  const badge=esc(p.badge);
  const bclass=badgeClass(p.badge);

  // Overall shows all modes. A single mode shows only the selected mode.
  const tiersByP={};
  tiers.filter(t=>t.player_id===pid).forEach(t=>tiersByP[t.mode_id]=t.tier_type);
  const modalModes=activeMode==='overall'?modes:modes.filter(m=>m.id===activeMode);
  const hasTiers=modalModes.some(m=>tiersByP[m.id]);
  const tiersHtml=modalModes.map(m=>{
    const tier=tiersByP[m.id];
    if(!tier) return'';
    const iconContent=m.icon_url?`<img src="${esc(m.icon_url)}" alt="${esc(m.name)}" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`:esc(m.icon||'🎮');
    return`<div class="mode-tier-item" style="flex-direction:row;gap:6px;align-items:center;background:var(--bg3);border-radius:8px;padding:6px 10px">
      <div class="mode-icon" style="flex-shrink:0">${iconContent}</div>
      <span style="font-size:0.75rem;color:var(--text2);font-weight:600">${esc(m.name)}</span>
      <span class="tier-mini ${TIER_CLASS[tier]||'t-F'}" style="margin-left:auto">${tier}</span>
    </div>`;
  }).join('');

  const overallModes=modes.filter(m=>m.include_in_overall);
  const overallModeIds=new Set(overallModes.map(m=>m.id));
  const totalPts=tiers.filter(t=>t.player_id===pid&&overallModeIds.has(t.mode_id)).reduce((s,t)=>s+(TIER_SCORE[t.tier_type]||0),0);
  const activeModeInfo=modes.find(m=>m.id===activeMode);
  const positionLabel=esc(activeMode==='overall'?'OVERALL':(activeModeInfo?.name||'MODE'));
  const currentTier=activeMode==='overall'?null:tiersByP[activeMode];
  const positionMeta=activeMode==='overall'
    ?`${totalPts} points`
    :(currentTier?`${currentTier} tier / ${totalPts} overall pts`:`${totalPts} overall pts`);

  const regionLabels={'TH':'Thailand','AS':'Asia','EU':'Europe','NA':'North America'};

  document.getElementById('modalInner').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-avatar">${p.avatar?`<img src="${esc(p.avatar)}" alt="${playerName}">`:esc((p.name?.[0]||'?').toUpperCase())}</div>
    <div class="modal-name">${playerName}</div>
    ${p.uid?`<div style="font-size:0.72rem;color:var(--text3);margin-bottom:4px;letter-spacing:0.05em">UID: <span style="color:var(--text2);font-weight:600">${esc(p.uid)}</span></div>`:''}
    ${p.badge?`<div><span class="modal-badge ${bclass}">◈ ${badge}</span></div>`:''}
    <div class="modal-region">${regionLabels[reg]||reg}</div>
    <div class="modal-section">
      <div class="modal-section-title">Position</div>
      <div class="modal-position-box">
        <div class="modal-pos-num">${rank}.</div>
        <div class="modal-pos-detail">🏆 ${positionLabel} <span style="color:var(--text3);font-weight:500">(${positionMeta})</span></div>
      </div>
    </div>
    ${hasTiers?`<div class="modal-section">
      <div class="modal-section-title">Tiers</div>
      <div class="modal-tiers-box" style="flex-direction:column;gap:6px">${tiersHtml}</div>
    </div>`:''}
  `;

  const bd=document.getElementById('modalBackdrop');
  bd.style.display='flex';
  requestAnimationFrame(()=>bd.classList.add('show'));
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalBackdrop')&&!e.target.classList.contains('modal-close')) return;
  const bd=document.getElementById('modalBackdrop');
  bd.classList.remove('show');
  setTimeout(()=>{bd.style.display='none';document.body.style.overflow='';},200);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal({target:document.getElementById('modalBackdrop')});
});

// RIPPLE EFFECT
function spawnRipple(el, e){
  const rect=el.getBoundingClientRect();
  const x=(e.clientX??e.touches?.[0]?.clientX??rect.left+rect.width/2)-rect.left;
  const y=(e.clientY??e.touches?.[0]?.clientY??rect.top+rect.height/2)-rect.top;
  const size=Math.max(rect.width,rect.height)*1.2;
  const r=document.createElement('span');
  r.className='ripple-circle';
  r.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px`;
  el.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
}

function attachRipples(){
  document.querySelectorAll('.t-row,.tab-btn,.stat-card,.nav-link').forEach(el=>{
    if(el.dataset.ripple) return;
    el.dataset.ripple='1';
    el.classList.add('ripple-host');
    el.addEventListener('pointerdown',e=>spawnRipple(el,e));
  });
}

// attach after every render
const _origRender=render;
render=function(...a){_origRender(...a);requestAnimationFrame(attachRipples)};
</script>
