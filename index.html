<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comboo 500 — Tier List</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#0b0d12;--bg1:#10131a;--bg2:#171b25;--bg3:#1e2330;
  --text1:#eceef4;--text2:#8b91a8;--text3:#4a5068;
  --accent:#e8b84b;--accent2:#c49a2a;
  --border:#ffffff0c;--border2:#ffffff18;
}
body{background:var(--bg0);color:var(--text1);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* NAV */
nav{background:var(--bg1);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-size:1.05rem;font-weight:700;letter-spacing:-0.02em}
.logo-text span{color:var(--accent)}
.logo-sub{font-size:0.72rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:10px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:15px;height:15px}
.search-wrap input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;color:var(--text1);font-size:0.83rem;width:200px;outline:none;transition:border .2s}
.search-wrap input:focus{border-color:#e8b84b55}
.search-wrap input::placeholder{color:var(--text3)}

/* TABS */
.tabs-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:7px;padding:12px 16px;border:none;background:none;color:var(--text3);font-size:0.82rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-icon{font-size:1rem}

/* HERO STAT */
.hero{padding:1.5rem 2rem 0;max-width:1100px;margin:0 auto;display:flex;gap:12px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:1rem 1.4rem;min-width:120px}
.stat-label{font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.stat-val{font-size:1.4rem;font-weight:700;color:var(--text1)}
.stat-val span{font-size:0.8rem;color:var(--text3);font-weight:400;margin-left:4px}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:1.5rem 2rem 4rem}

/* TABLE */
.table-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.t-head{display:grid;grid-template-columns:56px 1fr 100px 90px;padding:0 1.25rem;height:38px;align-items:center;border-bottom:1px solid var(--border);color:var(--text3);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.09em;font-weight:700}
.t-row{display:grid;grid-template-columns:56px 1fr 100px 90px;padding:0 1.25rem;align-items:center;border-bottom:1px solid var(--border2);transition:background .15s;min-height:66px}
.t-row:last-child{border-bottom:none}
.t-row:hover{background:#ffffff03}

/* RANK */
.rank-wrap{display:flex;align-items:center;gap:6px}
.rank-n{font-size:1rem;font-weight:700;color:var(--text3);min-width:20px}
.t-row.r1 .rank-n{color:#f5c842}
.t-row.r2 .rank-n{color:#a0a8b8}
.t-row.r3 .rank-n{color:#c87a3a}
.rank-crown{font-size:0.8rem}

/* PLAYER */
.player-cell{display:flex;align-items:center;gap:12px;padding:10px 0}
.avatar{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--text3);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.player-name{font-size:0.95rem;font-weight:600;color:var(--text1)}
.player-badge{font-size:0.68rem;padding:2px 7px;border-radius:4px;margin-top:3px;display:inline-block;font-weight:600}

/* TIER BADGE */
.tier-pill{display:inline-flex;align-items:center;justify-content:center;width:52px;height:28px;border-radius:6px;font-size:0.82rem;font-weight:800;letter-spacing:0.02em;border:1px solid}
.t-Ap{background:#ff4d4d18;color:#ff6b6b;border-color:#ff4d4d40}
.t-A {background:#ff7a2718;color:#ff9355;border-color:#ff7a2740}
.t-Am{background:#ffaa0018;color:#ffbe44;border-color:#ffaa0040}
.t-Bp{background:#a8ff2718;color:#c3ff5a;border-color:#a8ff2740}
.t-B {background:#44ff8818;color:#5fffaa;border-color:#44ff8840}
.t-Bm{background:#00d4aa18;color:#00e8bb;border-color:#00d4aa40}
.t-Cp{background:#27b8ff18;color:#55cbff;border-color:#27b8ff40}
.t-C {background:#2787ff18;color:#55a3ff;border-color:#2787ff40}
.t-Cm{background:#6c63ff18;color:#9d97ff;border-color:#6c63ff40}
.t-Dp{background:#aa44ff18;color:#cc77ff;border-color:#aa44ff40}
.t-D {background:#ff44bb18;color:#ff77cc;border-color:#ff44bb40}
.t-Dm{background:#ff446618;color:#ff7788;border-color:#ff446640}
.t-F {background:#44444418;color:#888;border-color:#44444440}

/* REGION */
.reg{display:inline-block;padding:3px 8px;border-radius:5px;font-size:0.7rem;font-weight:700;letter-spacing:0.05em}
.reg-TH{background:#00d4aa18;color:#00d4aa;border:1px solid #00d4aa30}
.reg-AS{background:#6c63ff18;color:#9d97ff;border:1px solid #6c63ff30}
.reg-EU{background:#27b8ff18;color:#55cbff;border:1px solid #27b8ff30}
.reg-NA{background:#ffaa0018;color:#ffbe44;border:1px solid #ffaa0030}

/* EMPTY */
.empty{text-align:center;padding:5rem 2rem;color:var(--text3)}
.empty p{margin-top:8px;font-size:0.9rem}

/* LOADING */
.loading{text-align:center;padding:4rem;color:var(--text3);font-size:0.9rem}

@media(max-width:640px){
  .t-head,.t-row{grid-template-columns:44px 1fr 80px}
  .col-region{display:none}
  nav{padding:0 1rem}
  main,.hero{padding-left:1rem;padding-right:1rem}
  .hero{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div>
      <div class="logo-text"><span>Comboo</span> 500</div>
      <div class="logo-sub">Tier List</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหาผู้เล่น..." oninput="render()">
    </div>
  </div>
</nav>

<div class="tabs-bar" id="tabsBar"></div>

<div class="hero" id="heroStats"></div>

<main>
  <div class="table-wrap">
    <div class="t-head">
      <div>#</div>
      <div>ผู้เล่น</div>
      <div>Tier</div>
      <div class="col-region">ภูมิภาค</div>
    </div>
    <div id="tableBody"><div class="loading">กำลังโหลด...</div></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://qfdtnfhcdxucckxakrgu.supabase.co/rest/v1/'';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmZHRuZmhjZHh1Y2NreGFrcmd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjY1ODgsImV4cCI6MjA5Njk0MjU4OH0.7GpvmHdssndqwu1LAe4YhBAQoPrW7olw1u7CBAIC46g';

const TIER_ORDER = ['A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','F'];
const TIER_CLASS = {'A+':'t-Ap','A':'t-A','A-':'t-Am','B+':'t-Bp','B':'t-B','B-':'t-Bm','C+':'t-Cp','C':'t-C','C-':'t-Cm','D+':'t-Dp','D':'t-D','D-':'t-Dm','F':'t-F'};

let modes=[], players=[], tiers=[], activeMode=null;

async function api(path){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON}});
  return r.json();
}

async function load(){
  [modes,players,tiers]=await Promise.all([
    api('modes?order=sort_order'),
    api('players?order=name'),
    api('player_tiers?select=*')
  ]);
  if(modes.length) activeMode=modes[0].id;
  renderTabs();
  render();
}

function renderTabs(){
  document.getElementById('tabsBar').innerHTML=modes.map(m=>`
    <button class="tab-btn${m.id===activeMode?' active':''}" onclick="setMode(${m.id})">
      <span class="tab-icon">${m.icon||'🎮'}</span>${m.name}
    </button>
  `).join('');
}

function setMode(id){activeMode=id;renderTabs();render()}

function tierScore(t){const i=TIER_ORDER.indexOf(t);return i===-1?99:i}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const modeTiers=tiers.filter(t=>t.mode_id===activeMode);
  const tierMap={};
  modeTiers.forEach(t=>tierMap[t.player_id]=t);

  let list=players.filter(p=>tierMap[p.id]);
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q));
  list.sort((a,b)=>tierScore(tierMap[a.id]?.tier)-tierScore(tierMap[b.id]?.tier));

  // hero stats
  const counts={};
  TIER_ORDER.forEach(t=>counts[t]=0);
  modeTiers.forEach(t=>{if(counts[t.tier]!==undefined)counts[t.tier]++});
  const topTier=TIER_ORDER.find(t=>counts[t]>0)||'-';
  document.getElementById('heroStats').innerHTML=`
    <div class="stat-card"><div class="stat-label">ผู้เล่นทั้งหมด</div><div class="stat-val">${list.length}<span>คน</span></div></div>
    <div class="stat-card"><div class="stat-label">Tier สูงสุด</div><div class="stat-val">${topTier}</div></div>
    <div class="stat-card"><div class="stat-label">A+ Tier</div><div class="stat-val">${counts['A+']}<span>คน</span></div></div>
  `;

  if(!list.length){
    document.getElementById('tableBody').innerHTML=`<div class="empty"><div style="font-size:2rem">🏆</div><p>ยังไม่มีผู้เล่นใน mode นี้</p></div>`;
    return;
  }

  document.getElementById('tableBody').innerHTML=list.map((p,i)=>{
    const td=tierMap[p.id];
    const tier=td?.tier||'F';
    const av=p.avatar
      ?`<div class="avatar"><img src="${p.avatar}" alt="${p.name}" loading="lazy"></div>`
      :`<div class="avatar">${p.name[0]?.toUpperCase()}</div>`;
    const reg=p.region||'TH';
    return`<div class="t-row r${i+1}">
      <div class="rank-wrap"><span class="rank-n">${i+1}</span>${i===0?'<span class="rank-crown">👑</span>':''}</div>
      <div class="player-cell">${av}<div>
        <div class="player-name">${p.name}</div>
        ${p.badge?`<span class="player-badge" style="background:#e8b84b18;color:#e8b84b;border:1px solid #e8b84b30">${p.badge}</span>`:''}
      </div></div>
      <div><span class="tier-pill ${TIER_CLASS[tier]||'t-F'}">${tier}</span></div>
      <div class="col-region"><span class="reg reg-${reg}">${reg}</span></div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
